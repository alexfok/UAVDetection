video:
  # Use "0" or "usb:0" for a local camera, "camera:<id>" for the registry below,
  # an RTSP URL, a video file, or an image file.
  source: "0"
  camera_config: "data_store/system_config/cameras.yaml"
  resize_width: 1920
  resize_height: 1080
  frame_skip: 0
  reconnect_attempts: 5
  reconnect_delay_sec: 2.0
  buffer_size: 1

detector:
  model_path: "data_store/models/trained/yolov8n_drone_best.pt"
  confidence_threshold: 0.3
  iou_threshold: 0.45
  image_size: 960
  # Empty string lets Ultralytics choose. Examples: "cpu", "mps" on Apple Silicon, "0" for CUDA.
  device: ""
  # With the trained model, "drone" resolves directly to the model's drone class.
  # With COCO yolov8n, "drone" resolves through label_aliases to airplane/kite.
  target_classes:
    - drone
  label_aliases:
    airplane: drone
    kite: drone

tracker:
  iou_match_threshold: 0.25
  max_track_age_sec: 2.0
  min_box_area: 8

alert:
  confidence_threshold: 0.3
  persistence_frames: 5
  window_seconds: 2.0
  cooldown_seconds: 1.0

ui:
  window_name: "Fast Drone Detection PoC"
  show_window: true
  fullscreen: false
  draw_all_tracks: true
  save_output: false
  output_path: "videos/annotated_output.mp4"

logging:
  level: "INFO"
