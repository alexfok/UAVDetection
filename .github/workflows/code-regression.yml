name: Code Regression

on:
  push:
  pull_request:

jobs:
  code-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run code regression checks
        env:
          PYTHONPYCACHEPREFIX: /tmp/uav_pycache
        run: python scripts/run_regression.py --code --require-node
